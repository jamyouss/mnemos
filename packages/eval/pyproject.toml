[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mnemos-eval"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.6.0",
    "pyyaml>=6.0",
    "httpx>=0.27.0",
    "rich>=13.7.0",
]

[tool.setuptools]
packages = ["eval"]
package-dir = {"eval" = "."}
