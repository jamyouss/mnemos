[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "rag-core"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "qdrant-client>=1.9.0",
    "sentence-transformers>=2.6.0",
    "tree-sitter>=0.22.0",
    "tree-sitter-go>=0.21.0",
    "tree-sitter-typescript>=0.21.0",
    "pydantic>=2.6.0",
]

