services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 5

  rag-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8100:8100"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      CODEBASE_PATH: /data/codebase
      CLAUDE_CONFIG_PATH: /data/claude-config
      MNEMOS_MODE: local
      MNEMOS_AUTH_ENABLED: "false"
      MNEMOS_STATE_DIR: /data/state
      MNEMOS_LLM_PROVIDER: ollama
      MNEMOS_LLM_MODEL: "llama3.1:8b"
      MNEMOS_OLLAMA_URL: http://ollama:11434
      MNEMOS_DEDUP_THRESHOLD: "0.85"
      MNEMOS_DEDUP_STRATEGY: merge
    volumes:
      - ~/Developments/Projects:/data/codebase:ro
      - ~/.claude:/data/claude-config:ro
      - rag_state:/data/state
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  watcher:
    build:
      context: .
      dockerfile: watcher/Dockerfile
    environment:
      MNEMOS_SERVER_URL: http://rag-server:8100
      CODEBASE_PATH: /data/codebase
      CLAUDE_CONFIG_PATH: /data/claude-config
      WATCHER_DEBOUNCE_MS: 2000
    volumes:
      - ~/Developments/Projects:/data/codebase:ro
      - ~/.claude:/data/claude-config:ro
    depends_on:
      rag-server:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - llm

volumes:
  qdrant_data:
  rag_state:
  ollama_data:
