services:
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 10s
      start_period: 10s
      retries: 5

  rag-server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8100:8100"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      CODEBASE_PATH: /data/codebase
      CLAUDE_CONFIG_PATH: /data/claude-config
      MNEMOS_MODE: local
      MNEMOS_AUTH_ENABLED: "false"
      MNEMOS_STATE_DIR: /data/state
      # LLM (ollama | anthropic | openai). See .env.example for full reference.
      MNEMOS_LLM_PROVIDER: "${MNEMOS_LLM_PROVIDER:-ollama}"
      MNEMOS_LLM_MODEL: "${MNEMOS_LLM_MODEL:-llama3.1:8b}"
      MNEMOS_LLM_API_KEY: "${MNEMOS_LLM_API_KEY:-}"
      MNEMOS_LLM_BASE_URL: "${MNEMOS_LLM_BASE_URL:-}"
      MNEMOS_OLLAMA_URL: "${MNEMOS_OLLAMA_URL:-http://ollama:11434}"
      MNEMOS_DEDUP_THRESHOLD: "0.85"
      MNEMOS_DEDUP_STRATEGY: merge
      # Contextual retrieval (Anthropic-style preamble per chunk via LLM)
      MNEMOS_CONTEXTUAL_ENABLED: "${MNEMOS_CONTEXTUAL_ENABLED:-false}"
      MNEMOS_CONTEXTUAL_WORKERS: "${MNEMOS_CONTEXTUAL_WORKERS:-4}"
      # Cross-encoder reranker (Phase 2B). Default model: bge-reranker-base (~280MB).
      MNEMOS_RERANKER_ENABLED: "${MNEMOS_RERANKER_ENABLED:-false}"
      MNEMOS_RERANKER_MODEL: "${MNEMOS_RERANKER_MODEL:-BAAI/bge-reranker-base}"
      MNEMOS_RERANKER_TYPE: "${MNEMOS_RERANKER_TYPE:-cross-encoder}"
      MNEMOS_MMR_ENABLED: "${MNEMOS_MMR_ENABLED:-false}"
      MNEMOS_MMR_LAMBDA: "${MNEMOS_MMR_LAMBDA:-0.5}"
      # CRAG corrective loop (Phase 3)
      MNEMOS_GRADER_ENABLED: "${MNEMOS_GRADER_ENABLED:-false}"
      MNEMOS_GRADER_WORKERS: "${MNEMOS_GRADER_WORKERS:-4}"
      MNEMOS_REWRITER_ENABLED: "${MNEMOS_REWRITER_ENABLED:-false}"
      MNEMOS_REWRITER_STRATEGY: "${MNEMOS_REWRITER_STRATEGY:-expansion}"
      MNEMOS_REWRITER_MAX_VARIANTS: "${MNEMOS_REWRITER_MAX_VARIANTS:-3}"
      # Semantic router (Phase 4D)
      MNEMOS_ROUTER_ENABLED: "${MNEMOS_ROUTER_ENABLED:-false}"
      MNEMOS_ROUTER_TOP_K: "${MNEMOS_ROUTER_TOP_K:-2}"
      MNEMOS_ROUTER_MIN_SCORE: "${MNEMOS_ROUTER_MIN_SCORE:-0.4}"
      # Semantic cache (Phase 4E)
      MNEMOS_CACHE_ENABLED: "${MNEMOS_CACHE_ENABLED:-false}"
      MNEMOS_CACHE_THRESHOLD: "${MNEMOS_CACHE_THRESHOLD:-0.95}"
      MNEMOS_CACHE_TTL_SECONDS: "${MNEMOS_CACHE_TTL_SECONDS:-3600}"
      # Observability (Phase 9)
      MNEMOS_QUERY_LOG_ENABLED: "${MNEMOS_QUERY_LOG_ENABLED:-false}"
      MNEMOS_QUERY_LOG_PATH: "${MNEMOS_QUERY_LOG_PATH:-/data/state/query-log.jsonl}"
    volumes:
      # Mount your source code so Mnemos can index it. Set MNEMOS_CODEBASE_HOST_PATH
      # to a project root on your host, e.g. "~/code" or "/srv/projects".
      - ${MNEMOS_CODEBASE_HOST_PATH:-./data/codebase}:/data/codebase:ro
      # Optional: mount your Claude config (skills, docs) for agent indexing.
      - ${MNEMOS_CLAUDE_CONFIG_HOST_PATH:-./data/claude-config}:/data/claude-config:ro
      - rag_state:/data/state
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  watcher:
    build:
      context: .
      dockerfile: watcher/Dockerfile
    environment:
      MNEMOS_SERVER_URL: http://rag-server:8100
      CODEBASE_PATH: /data/codebase
      CLAUDE_CONFIG_PATH: /data/claude-config
      WATCHER_DEBOUNCE_MS: 2000
    volumes:
      - ${MNEMOS_CODEBASE_HOST_PATH:-./data/codebase}:/data/codebase:ro
      - ${MNEMOS_CLAUDE_CONFIG_HOST_PATH:-./data/claude-config}:/data/claude-config:ro
    depends_on:
      rag-server:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    profiles:
      - llm

volumes:
  qdrant_data:
  rag_state:
  ollama_data:
