services:
  rag-server:
    environment:
      MNEMOS_MODE: deployed
      MNEMOS_AUTH_ENABLED: "true"
    volumes:
      # Bring your own tenants config — it stays out of git on purpose.
      # Start from the template:  cp config/tenants.example.yaml config/tenants.yaml
      # then rotate the api_keys before the first push to production.
      - ./config/tenants.yaml:/data/config/tenants.yaml:ro

  watcher:
    profiles:
      - disabled
