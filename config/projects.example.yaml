# Mnemos — path → tags mapping (config/projects.yaml).
#
# Copy this file to `config/projects.yaml` (gitignored) and adapt it to your
# layout. Without this file, Mnemos emits cumulative path segments as tags
# by default (`foo/bar/baz/file.go` → `[foo, foo/bar, foo/bar/baz]`) — usable
# but coarse-grained. Custom tags let you express both the project hierarchy
# and cross-cutting labels (techno, client, team) for richer filtering.
#
# Schema
# ------
# Top-level key:   `paths:`
# Sub-keys:        path prefixes RELATIVE to the codebase mount root (no
#                  leading slash). Longest matching prefix wins on conflict.
# Values:          list of tags. First tag = primary (displayed as the
#                  default project label in search results).
#
# Search
# ------
# Filters are exposed everywhere as `tags_any` (OR) and `tags_all` (AND).
#   mnemos search --tags acme,moby                # OR
#   mnemos search --tags-all acme,vue3            # AND
#   mnemos_search_code(tags_any=["acme-front-app-ecommerce", "acme-front-lib-auth"])

paths:

  # Example 1 — monorepo with explicit per-service tagging + a techno tag
  # myorg/services/billing/:
  #   - billing                    # primary tag (default display label)
  #   - myorg
  #   - myorg-services
  #   - go
  # myorg/services/payments/:
  #   - payments
  #   - myorg
  #   - myorg-services
  #   - go

  # Example 2 — one logical project living under two physical paths
  # apps/billing/payments/:
  #   - payments
  #   - billing-team
  # libs/shared/payments/:
  #   - payments                   # same primary → unified project view
  #   - shared

  # Example 3 — cross-cutting techno labels for transverse queries
  # apps/dashboard/:
  #   - dashboard
  #   - vue3                       # `mnemos search --tags vue3` matches it
  #   - typescript
