name: Build & push Docker images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

# Cancel in-progress runs on the same ref — we only need the latest push.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # One matrix entry per image. Both build in parallel.
  # -----------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            image: jamyouss/mnemos-server
            dockerfile: server/Dockerfile
          - name: watcher
            image: jamyouss/mnemos-watcher
            dockerfile: watcher/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation on amd64 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            # push to main → `edge` tag
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }},priority=900,prefix=,suffix=,value=edge
            # semver tags from git tags v1.2.3 → 1.2.3, 1.2, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Log in to Docker Hub
        # Only authenticate when we actually intend to push (not on PRs).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Multi-arch covers Apple Silicon (arm64) and the typical x86 server.
          platforms: linux/amd64,linux/arm64
          # Only push when we're on main / a tag; PR builds stay local.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted cache so successive builds reuse layers across CI runs.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
          provenance: false  # smaller manifest, fine for our use case
