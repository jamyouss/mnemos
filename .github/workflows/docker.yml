name: Build & push Docker images

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

# Cancel in-progress runs on the same ref — we only need the latest push.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Stage 1: build each (image, platform) pair on a native runner.
  # No QEMU emulation — arm64 builds run on ubuntu-24.04-arm, amd64 on
  # ubuntu-latest. Each job pushes a per-platform manifest by digest.
  # -----------------------------------------------------------------------
  build:
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: server
            repo: jamyouss/mnemos-server
            dockerfile: server/Dockerfile
          - name: watcher
            repo: jamyouss/mnemos-watcher
            dockerfile: watcher/Dockerfile
        platform:
          - { name: amd64, runner: ubuntu-latest,   tag: linux/amd64 }
          - { name: arm64, runner: ubuntu-24.04-arm, tag: linux/arm64 }
    runs-on: ${{ matrix.platform.runner }}

    steps:
      - name: Prepare platform pair name
        run: |
          platform=${{ matrix.platform.tag }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta (labels only at this stage)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image.repo }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only authenticate when we actually intend to push (not on PRs).
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.tag }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ matrix.image.repo }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.name }},mode=max
          provenance: false

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # -----------------------------------------------------------------------
  # Stage 2: assemble the per-platform digests into a single multi-arch
  # manifest list and push the human-friendly tags (edge, semver, latest).
  # -----------------------------------------------------------------------
  merge:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: server
            repo: jamyouss/mnemos-server
          - name: watcher
            repo: jamyouss/mnemos-watcher

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image.name }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image.repo }}
          tags: |
            # Manual workflow_dispatch from main → `edge` tag (no semver to derive).
            type=ref,event=branch,enable=${{ github.event_name == 'workflow_dispatch' }},priority=900,prefix=,suffix=,value=edge
            # Semver tags from git tags v1.2.3 → 1.2.3, 1.2, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image.repo }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ matrix.image.repo }}:${{ steps.meta.outputs.version }}

  # -----------------------------------------------------------------------
  # Stage 3: keep Docker Hub overview + short description in sync with the
  # README files in docs/. Runs on each release tag (and on manual dispatch).
  # Failures here don't block the build outputs above.
  # -----------------------------------------------------------------------
  docs-sync:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: merge
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: jamyouss/mnemos-server
            short: "Self-hosted memory layer for AI coding agents — MCP-native RAG over your code + docs."
            readme: docs/DOCKERHUB.md
          - repo: jamyouss/mnemos-watcher
            short: "Filesystem watcher for mnemos-server — pushes incremental indexing as your code changes."
            readme: docs/DOCKERHUB-watcher.md

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push description to Docker Hub
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ matrix.repo }}
          short-description: ${{ matrix.short }}
          readme-filepath: ${{ matrix.readme }}
