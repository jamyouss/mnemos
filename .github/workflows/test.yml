name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install packages
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/core -e packages/eval -e cli/
          pip install -r server/requirements.txt
          pip install -r watcher/requirements.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests
        # Integration-style tests that need a live server / qdrant stay out of CI for now.
        run: |
          pytest tests/ -q \
            --ignore=tests/test_api.py \
            --ignore=tests/test_cli.py \
            --ignore=tests/test_server.py \
            --ignore=tests/test_mcp_integration.py \
            --ignore=tests/test_mcp_tools.py \
            --ignore=tests/test_extract_api.py
